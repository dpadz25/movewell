<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MoveWell, Your Movement Companion</title>
  <meta name="description" content="A friendly movement companion. Build routines, log exercises from therapy stretches to gym lifts, and track how your body feels.">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- cache-buster: bump the v= number on every file below with each deploy -->
  <link rel="stylesheet" href="css/styles.css?v=20260708b">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="header-title" id="header-title">Move<span>Well</span></div>
      <div class="header-sub" id="header-sub">Your movement companion</div>
    </div>
    <button class="icon-btn" id="btn-settings" title="Settings" aria-label="Settings"><span data-icon="gear"></span></button>
  </header>

  <!-- PAGES -->
  <main class="page active" id="page-home"><div class="scroll" id="home-scroll"></div></main>
  <main class="page" id="page-routines"><div class="scroll" id="routines-scroll"></div></main>
  <main class="page" id="page-library"><div class="scroll" id="library-scroll"></div></main>
  <main class="page" id="page-bodymap"><div class="scroll" id="bodymap-scroll"></div></main>
  <main class="page" id="page-progress"><div class="scroll" id="progress-scroll"></div></main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home"><span class="nav-icon" data-icon="home"></span>Home</button>
    <button class="nav-btn" data-page="routines"><span class="nav-icon" data-icon="clipboard"></span>Routines</button>
    <button class="nav-btn" data-page="library"><span class="nav-icon" data-icon="book"></span>Exercises</button>
    <button class="nav-btn" data-page="bodymap"><span class="nav-icon" data-icon="person"></span>Body Map</button>
    <button class="nav-btn" data-page="progress"><span class="nav-icon" data-icon="chart"></span>Progress</button>
  </nav>

  <!-- ONBOARDING -->
  <div class="onboard" id="onboard">
    <div class="onboard-inner" id="onboard-inner"></div>
  </div>

  <!-- SESSION MODE -->
  <div class="session" id="session">
    <div class="session-top">
      <button class="icon-btn" id="session-exit" title="Exit session"><span data-icon="close"></span></button>
      <div class="session-progress-text" id="session-progress-text"></div>
      <div class="session-clock" id="session-clock">0:00</div>
    </div>
    <div class="session-progressbar"><div class="session-progressbar-fill" id="session-progressbar-fill"></div></div>
    <div class="session-body" id="session-body"></div>
    <div class="session-nav" id="session-nav"></div>
  </div>

  <!-- REST TIMER OVERLAY -->
  <div class="rest-overlay" id="rest-overlay">
    <div class="rest-title">Rest</div>
    <div class="rest-display" id="rest-display">0:60</div>
    <div class="rest-presets">
      <button class="btn secondary small" data-rest="30">30s</button>
      <button class="btn secondary small" data-rest="60">1 min</button>
      <button class="btn secondary small" data-rest="90">90s</button>
      <button class="btn secondary small" data-rest="120">2 min</button>
    </div>
    <button class="btn big" id="rest-skip">I'm Ready, Continue</button>
  </div>

  <!-- CELEBRATION -->
  <div class="celebrate" id="celebrate">
    <div class="celebrate-backdrop"></div>
    <canvas id="confetti-canvas"></canvas>
    <div class="celebrate-card" id="celebrate-card"></div>
  </div>

  <!-- GENERIC BOTTOM SHEET MODAL -->
  <div class="modal" id="modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <button class="modal-close" id="modal-back" aria-label="Back" style="display:none"><span data-icon="arrowLeft"></span></button>
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" id="modal-close" aria-label="Close"><span data-icon="close"></span></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm" id="confirm">
    <div class="modal-backdrop" id="confirm-backdrop"></div>
    <div class="confirm-card">
      <h3 id="confirm-title"></h3>
      <p id="confirm-text"></p>
      <div class="btn-row">
        <button class="btn secondary" id="confirm-no">Cancel</button>
        <button class="btn danger" id="confirm-yes">Yes</button>
      </div>
    </div>
  </div>

  <!-- GUIDED TOUR -->
  <div class="tour" id="tour">
    <div class="tour-hole" id="tour-hole"></div>
    <div class="tour-card" id="tour-card">
      <div class="tour-step-num" id="tour-step-num"></div>
      <div class="tour-title" id="tour-title"></div>
      <div class="tour-text" id="tour-text"></div>
      <div class="tour-btns">
        <button class="btn secondary" id="tour-skip">Skip Tour</button>
        <button class="btn grad" id="tour-next">Continue</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ICONS + DATA -->
  <script src="js/icons.js?v=20260708b"></script>
  <script src="js/data/exercises-upper.js?v=20260708b"></script>
  <script src="js/data/exercises-lower.js?v=20260708b"></script>
  <script src="js/data/exercises-core.js?v=20260708b"></script>
  <script src="js/data/exercises-gym.js?v=20260708b"></script>
  <script src="js/data/exercises-yoga.js?v=20260708b"></script>
  <script src="js/data/exercises-extra.js?v=20260708b"></script>
  <script src="js/data/templates.js?v=20260708b"></script>
  <!-- APP -->
  <script src="js/core.js?v=20260708b"></script>
  <script src="js/library.js?v=20260708b"></script>
  <script src="js/routines.js?v=20260708b"></script>
  <script src="js/bodymap.js?v=20260708b"></script>
  <script src="js/session.js?v=20260708b"></script>
  <script src="js/progress.js?v=20260708b"></script>
  <script src="js/tour.js?v=20260708b"></script>
</body>
</html>
